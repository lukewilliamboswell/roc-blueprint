name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, e.g. 0.1.0"
        required: true
        type: string
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('release-{0}', github.repository) || format('release-validate-{0}-{1}', github.repository, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  build:
    name: Build release bundles
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.validate.outputs.release_version }}
      blueprint_release_version: ${{ steps.package_versions.outputs.blueprint }}
      blueprint_nix_release_version: ${{ steps.package_versions.outputs.blueprint_nix }}
      test_matrix: ${{ steps.bundles.outputs.test_matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Roc
        uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          version: nightly-new-compiler

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c

      - name: Validate release request
        id: validate
        uses: roc-lang/release-package/actions/validate-release@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          check_availability: false
          github_token: ${{ github.token }}

      - name: Define package release versions
        id: package_versions
        env:
          RELEASE_VERSION: ${{ steps.validate.outputs.release_version }}
        run: |
          echo "blueprint=${RELEASE_VERSION}-blueprint" >> "$GITHUB_OUTPUT"
          echo "blueprint_nix=${RELEASE_VERSION}-blueprint-nix" >> "$GITHUB_OUTPUT"

      - name: Validate blueprint release request
        uses: roc-lang/release-package/actions/validate-release@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ steps.package_versions.outputs.blueprint }}
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          check_availability: ${{ github.event_name == 'workflow_dispatch' }}
          github_token: ${{ github.token }}

      - name: Validate blueprint-nix release request
        uses: roc-lang/release-package/actions/validate-release@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ steps.package_versions.outputs.blueprint_nix }}
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          check_availability: ${{ github.event_name == 'workflow_dispatch' }}
          github_token: ${{ github.token }}

      - name: Validate repository
        run: ./ci/all_tests.sh

      - name: Record compatibility-check status
        uses: roc-lang/release-package/actions/run-bump-check@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ steps.validate.outputs.release_version }}
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          bump_check: off

      - name: Bundle packages
        run: |
          ./scripts/bundle.sh --output-dir dist
          python3 scripts/create_bundle_manifest.py

      - name: Prepare release metadata
        id: bundles
        uses: roc-lang/release-package/actions/prepare-bundles@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          bundle_glob: dist/*/*.tar.zst
          bundle_manifest_path: dist/release-bundles.json

      - name: Split package release metadata
        run: python3 scripts/split_release_metadata.py

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: .release/bundles/*
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            .release/bump-output.txt
            .release/release-bundles.json
            .release/release-bundles-blueprint.json
            .release/release-bundles-blueprint-nix.json
            .release/test-matrix.json
          if-no-files-found: error

  test-bundles:
    name: Test ${{ matrix.bundle_name }} (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.build.outputs.test_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Roc
        uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          version: nightly-new-compiler

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c

      - uses: actions/download-artifact@v4
        with:
          name: release-bundles
          path: .release/test-bundles

      - name: Test release bundle
        uses: roc-lang/release-package/actions/test-bundle@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          test_bundle_command: python3 ci/test_examples.py --bundle-path
          bundle_path: .release/test-bundles/${{ matrix.artifact_file }}
          bundle_name: ${{ matrix.bundle_name }}
          release_version: ${{ needs.build.outputs.release_version }}

  publish:
    name: Publish package releases
    needs: [build, test-bundles]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-bundles
          path: .release/bundles

      - uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: .release

      - name: Make release notes
        uses: roc-lang/release-package/actions/make-release-notes@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ needs.build.outputs.release_version }}
          github_token: ${{ github.token }}

      - name: Add package URLs to release notes
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: python3 scripts/add_release_app_header.py

      - name: Publish blueprint release
        uses: roc-lang/release-package/actions/publish-release@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ needs.build.outputs.blueprint_release_version }}
          release_list_file: .release/release-bundles-blueprint.json
          github_token: ${{ github.token }}

      - name: Publish blueprint-nix release
        uses: roc-lang/release-package/actions/publish-release@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ needs.build.outputs.blueprint_nix_release_version }}
          release_list_file: .release/release-bundles-blueprint-nix.json
          github_token: ${{ github.token }}

      - name: Update published package URLs
        run: |
          python3 scripts/update_release_urls.py \
            --repo "${{ github.repository }}" \
            --version "${{ needs.build.outputs.release_version }}"

      - name: Open release follow-up pull request
        uses: roc-lang/release-package/actions/create-followup-pr@d2560ead9f724bfaabfbc8134b8895e120171064
        with:
          release_version: ${{ needs.build.outputs.release_version }}
          paths: README.md examples
          commit_message: Update package URLs for ${{ needs.build.outputs.release_version }}
          pr_title: Update package URLs for ${{ needs.build.outputs.release_version }}
          pr_body: |
            Update the README and example app headers to use the newly published
            `blueprint` and `blueprint-nix` package bundles.
          github_token: ${{ github.token }}
